name: Test

on:
  pull_request:
    branches: [main]

jobs:
  swift-tests:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios/CoreMLAudioApp
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme CoreMLAudioApp \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:CoreMLAudioAppTests \
            -resultBundlePath TestResults.xcresult
